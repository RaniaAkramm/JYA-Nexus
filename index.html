<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JYA Nexus | Real-Time AIoT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Noto+Sans+Arabic:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans Arabic', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .rtl { direction: rtl; }
    </style>
</head>
<body class="bg-[#020617] text-slate-100">

    <nav class="sticky top-0 z-50 border-b border-slate-800/50 bg-[#020617]/90 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/40">
                    <i data-lucide="globe" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-2xl font-black tracking-tighter">JYA.io</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="locationBadge" class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400 font-bold uppercase tracking-widest">Detecting Location...</span>
                <select id="langBtn" onchange="updateUI()" class="bg-slate-900 border border-slate-800 rounded-full px-3 py-1.5 text-xs font-bold outline-none">
                    <option value="en">English</option>
                    <option value="ar">العربية</option>
                </select>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-12">
        <div class="mb-12">
            <h1 id="h1" class="text-4xl font-black mb-2">Real-Time Environment Monitor</h1>
            <p id="p1" class="text-slate-500">Live data fetched from global sensory networks for JYA.io</p>
        </div>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <!-- Real Temperature Card -->
            <div class="glass p-8 rounded-[2rem] border-l-4 border-orange-500">
                <div class="flex justify-between items-center mb-4">
                    <span id="l-temp" class="text-slate-400 text-sm font-bold uppercase">Temperature</span>
                    <i data-lucide="thermometer" class="text-orange-500"></i>
                </div>
                <div class="text-5xl font-black"><span id="val-temp">--</span>°C</div>
                <div id="temp-status" class="text-xs mt-4 text-slate-500 italic">Syncing...</div>
            </div>

            <!-- Real Humidity Card -->
            <div class="glass p-8 rounded-[2rem] border-l-4 border-blue-500">
                <div class="flex justify-between items-center mb-4">
                    <span id="l-hum" class="text-slate-400 text-sm font-bold uppercase">Humidity</span>
                    <i data-lucide="droplets" class="text-blue-500"></i>
                </div>
                <div class="text-5xl font-black"><span id="val-hum">--</span>%</div>
                <div id="hum-status" class="text-xs mt-4 text-slate-500 italic">Reading atmosphere...</div>
            </div>

            <!-- Real AI Insights -->
            <div class="glass p-8 rounded-[2rem] bg-gradient-to-br from-blue-600/10 to-transparent">
                <div class="flex justify-between items-center mb-4">
                    <span id="l-ai" class="text-slate-400 text-sm font-bold uppercase">AI Prediction</span>
                    <i data-lucide="brain" class="text-purple-400"></i>
                </div>
                <div id="ai-insight" class="text-sm font-bold leading-relaxed text-blue-400">Analyzing live environmental data to provide recommendations...</div>
            </div>
        </section>

        <section class="glass p-10 rounded-[3rem] mb-20">
            <h2 id="h2" class="text-2xl font-black mb-8">Data Convergence Map</h2>
            <div class="h-[300px]">
                <canvas id="iotChart"></canvas>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();

        // إعدادات افتراضية (استخدام مدينة السماوة كمثال)
        const city = "Samawah";
        const apiKey = "8ac5c4d57ba6a47d30773d323ed68962"; // مفتاح تجريبي مجاني

        async function fetchRealData() {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`);
                const data = await response.json();

                if(data.main) {
                    document.getElementById('val-temp').innerText = Math.round(data.main.temp);
                    document.getElementById('val-hum').innerText = data.main.humidity;
                    document.getElementById('locationBadge').innerText = `Live: ${data.name}, ${data.sys.country}`;
                    
                    // تحويل النتائج إلى رؤى ذكية
                    generateAIInsight(data.main.temp, data.main.humidity);
                    updateChart(data.main.temp);
                }
            } catch (error) {
                console.error("Data Sync Error", error);
            }
        }

        function generateAIInsight(t, h) {
            let msg = "";
            if (t > 30) msg = "Extreme heat detected. Efficiency may drop in industrial hardware. JYA Nexus suggests active cooling.";
            else if (t < 15) msg = "Low temperature alert. Ensure system insulation is active.";
            else msg = "Environmental conditions are optimal for hardware performance. System efficiency at 98%.";
            
            document.getElementById('ai-insight').innerText = msg;
        }

        // تحديث البيانات كل دقيقة
        fetchRealData();
        setInterval(fetchRealData, 60000);

        // Chart Setup
        const ctx = document.getElementById('iotChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Start', 'Current'],
                datasets: [{
                    label: 'Real Temp Curve',
                    data: [20, 20],
                    borderColor: '#3b82f6',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(59, 130, 246, 0.05)'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        function updateChart(newTemp) {
            chart.data.datasets[0].data.push(newTemp);
            chart.data.labels.push(new Date().toLocaleTimeString());
            if(chart.data.labels.length > 10) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.update();
        }

        const translations = {
            en: { h1: "Real-Time Environment Monitor", p1: "Live data fetched from global networks.", l_temp: "Temperature", l_hum: "Humidity", l_ai: "AI Prediction", h2: "Data Convergence Map" },
            ar: { h1: "مراقب البيئة الحقيقي", p1: "بيانات حية مسحوبة من الشبكات العالمية.", l_temp: "درجة الحرارة", l_hum: "الرطوبة", l_ai: "توقعات الذكاء الاصطناعي", h2: "خريطة تقارب البيانات" }
        };

        function updateUI() {
            const l = document.getElementById('langBtn').value;
            document.body.classList.toggle('rtl', l === 'ar');
            document.getElementById('h1').innerText = translations[l].h1;
            document.getElementById('p1').innerText = translations[l].p1;
            document.getElementById('l-temp').innerText = translations[l].l_temp;
            document.getElementById('l-hum').innerText = translations[l].l_hum;
            document.getElementById('l-ai').innerText = translations[l].l_ai;
            document.getElementById('h2').innerText = translations[l].h2;
        }
    </script>
</body>
</html>
