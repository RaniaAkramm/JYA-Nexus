<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JYA Nexus | Global Intelligence Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Leaflet Map Library -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+Arabic:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans Arabic', sans-serif; scroll-behavior: smooth; background: #020617; color: white; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .rtl { direction: rtl; }
        #map { height: 450px; width: 100%; border-radius: 2rem; z-index: 10; border: 1px solid rgba(59, 130, 246, 0.2); }
        .search-glow:focus { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); border-color: #3b82f6; }
        .leaflet-container { background: #020617 !important; }
        /* Custom Map Marker Pulse */
        .pulse-marker { width: 12px; height: 12px; background: #3b82f6; border-radius: 50%; box-shadow: 0 0 0 rgba(59, 130, 246, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="sticky top-0 z-[100] glass border-b border-slate-800/50 px-6 h-20 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i data-lucide="map" class="text-white w-6 h-6"></i>
            </div>
            <span class="text-2xl font-black tracking-tighter">JYA<span class="text-blue-500">.io</span></span>
        </div>
        <div class="flex items-center gap-4">
            <select id="langSwitch" onchange="switchLang()" class="bg-slate-900 border border-slate-800 rounded-full px-3 py-1.5 text-xs font-bold outline-none cursor-pointer">
                <option value="en">English</option>
                <option value="ar">العربية</option>
                <option value="ku">کوردی</option>
            </select>
            <div class="hidden md:block h-8 w-[1px] bg-slate-800 mx-2"></div>
            <button onclick="document.getElementById('search-input').focus()" class="hidden md:flex items-center gap-2 text-xs text-slate-400">
                <i data-lucide="search" size="14"></i> <span id="nav-search">Global Search</span>
            </button>
        </div>
    </nav>

    <!-- Global Search -->
    <header class="max-w-7xl mx-auto px-6 py-12 text-center relative">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[300px] bg-blue-600/5 blur-[120px] rounded-full -z-10"></div>
        <h1 id="h1" class="text-4xl md:text-6xl font-black mb-6">Global Intelligence <span class="text-blue-500">Nodes</span></h1>
        
        <div class="max-w-2xl mx-auto relative">
            <input type="text" id="search-input" placeholder="Search city (e.g. Samawah, Dubai, New York...)" 
                class="w-full bg-slate-900/50 border border-slate-800 py-5 px-8 rounded-[2rem] text-lg outline-none search-glow transition-all">
            <button onclick="performSearch()" id="search-btn" class="absolute right-3 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-500 px-8 py-2.5 rounded-2xl font-bold transition-all">
                Sync
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        
        <!-- Interactive Map Section -->
        <section class="mb-12">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <span class="w-3 h-3 bg-blue-500 rounded-full animate-ping"></span>
                    <h2 id="active-city" class="text-2xl font-black tracking-tight uppercase">London, GB</h2>
                </div>
                <div class="text-[10px] font-bold text-slate-500 tracking-[0.2em]" id="coords-display">LAT: 0 | LON: 0</div>
            </div>
            <div id="map"></div>
        </section>

        <!-- Stats Grid -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass p-8 rounded-[2.5rem] border-l-4 border-orange-500">
                <i data-lucide="thermometer" class="text-orange-500 mb-6"></i>
                <div class="text-slate-500 text-[10px] font-black mb-1 uppercase tracking-widest" id="l-temp">Local Temp</div>
                <div class="text-5xl font-black tracking-tighter"><span id="val-temp">--</span>°C</div>
            </div>
            <div class="glass p-8 rounded-[2.5rem] border-l-4 border-blue-500">
                <i data-lucide="droplets" class="text-blue-400 mb-6"></i>
                <div class="text-slate-500 text-[10px] font-black mb-1 uppercase tracking-widest" id="l-hum">Local Humidity</div>
                <div class="text-5xl font-black tracking-tighter"><span id="val-hum">--</span>%</div>
            </div>
            <div class="glass p-8 rounded-[2.5rem] bg-gradient-to-br from-purple-600/10 to-transparent">
                <i data-lucide="brain-circuit" class="text-purple-400 mb-6"></i>
                <div class="text-slate-500 text-[10px] font-black mb-1 uppercase tracking-widest" id="l-ai">AI Predictive Node</div>
                <div id="ai-insight" class="text-sm font-bold leading-relaxed text-slate-300 italic">Connecting to regional data stream...</div>
            </div>
        </section>

        <!-- Analytics Chart -->
        <section class="glass p-10 rounded-[3rem]">
            <h3 id="chart-title" class="font-bold flex items-center gap-2 mb-8"><i data-lucide="bar-chart-3" class="text-blue-500"></i> Local Convergence History</h3>
            <div class="h-[300px]">
                <canvas id="mainChart"></canvas>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center opacity-30 text-[10px] font-bold tracking-widest border-t border-slate-900">
        JYA.IO NEXUS WORLD PROTOCOL | ENCRYPTED LINK ACTIVE
    </footer>

    <script>
        lucide.createIcons();

        // 1. Initialize Map
        const map = L.map('map', { zoomControl: false }).setView([51.505, -0.09], 4);
        
        // 2. High-Definition Dark Matter Tiles (Professional & HD)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        let currentMarker = L.marker([51.505, -0.09]).addTo(map);

        const translations = {
            en: { h1: "Global Intelligence Nodes", l_temp: "Local Temperature", l_hum: "Local Humidity", l_ai: "AI Predictive Node", chart_title: "Local Convergence History", search: "Search city...", sync: "Sync" },
            ar: { h1: "عقد الاستخبارات العالمية", l_temp: "درجة الحرارة المحلية", l_hum: "الرطوبة المحلية", l_ai: "عقدة التنبؤ الذكي", chart_title: "تاريخ تقارب البيانات", search: "ابحث عن مدينة...", sync: "مزامنة" },
            ku: { h1: "گرێیەکانی ژیری جیهانی", l_temp: "پلەی گەرمی ناوخۆیی", l_hum: "شێداری ناوخۆیی", l_ai: "گرێی پێشبینیکردنی AI", chart_title: "مێژووی داتاکان", search: "گەڕان بۆ شار...", sync: "هاوچەرخکردن" }
        };

        function switchLang() {
            const l = document.getElementById('langSwitch').value;
            document.body.classList.toggle('rtl', l === 'ar' || l === 'ku');
            document.getElementById('h1').innerText = translations[l].h1;
            document.getElementById('l-temp').innerText = translations[l].l_temp;
            document.getElementById('l-hum').innerText = translations[l].l_hum;
            document.getElementById('l-ai').innerText = translations[l].l_ai;
            document.getElementById('chart-title').innerText = translations[l].chart_title;
            document.getElementById('search-input').placeholder = translations[l].search;
            document.getElementById('search-btn').innerText = translations[l].sync;
        }

        async function fetchGlobalData(city) {
            try {
                const res = await fetch(`/api/weather?city=${encodeURIComponent(city)}`);
                const data = await res.json();
                
                if(data.main && data.coord) {
                    const { lat, lon } = data.coord;
                    
                    // Update Map
                    map.flyTo([lat, lon], 10, { duration: 2 });
                    if(currentMarker) map.removeLayer(currentMarker);
                    
                    const customIcon = L.divIcon({ className: 'pulse-marker', iconSize: [12, 12] });
                    currentMarker = L.marker([lat, lon], { icon: customIcon }).addTo(map);

                    // Update UI
                    document.getElementById('active-city').innerText = `${data.name}, ${data.sys.country}`;
                    document.getElementById('coords-display').innerText = `LAT: ${lat.toFixed(2)} | LON: ${lon.toFixed(2)}`;
                    document.getElementById('val-temp').innerText = Math.round(data.main.temp);
                    document.getElementById('val-hum').innerText = data.main.humidity;
                    
                    generateAI(data.main.temp, data.name);
                    updateChart(data.main.temp);
                } else {
                    alert("Node not found. Try a major city.");
                }
            } catch (e) { console.error("Sync failed"); }
        }

        function generateAI(t, name) {
            const ai = document.getElementById('ai-insight');
            if(t > 32) ai.innerText = `AI: High thermal density in ${name}. Recommend cooling protocols.`;
            else ai.innerText = `AI: Environment in ${name} is stable. Energy efficiency at 99%.`;
        }

        function performSearch() {
            const city = document.getElementById('search-input').value;
            if(city) fetchGlobalData(city);
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') performSearch();
        });

        // Chart.js
        const ctx = document.getElementById('mainChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)', borderWidth: 2, pointRadius: 0 }]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }}, scales: { y: { grid: { color: '#1e293b' } }, x: { grid: { display: false } } }}
        });

        function updateChart(val) {
            chart.data.labels.push(new Date().toLocaleTimeString([], {minute:'2-digit', second:'2-digit'}));
            chart.data.datasets[0].data.push(val);
            if(chart.data.labels.length > 10) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
            chart.update();
        }

        // Default Load
        fetchGlobalData("Samawah");
    </script>
</body>
</html>
